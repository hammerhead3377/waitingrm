<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Openclaw Terminal</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:      var(--tg-theme-bg-color,           #0d1117);
      --text:    var(--tg-theme-text-color,          #c9d1d9);
      --accent:  var(--tg-theme-button-color,        #00ff88);
      --surface: var(--tg-theme-secondary-bg-color,  #161b22);
      --border:  #30363d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #header {
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 6px;
      transition: background 0.3s;
    }
    #status-dot.ok { background: var(--accent); }
    #status-dot.err { background: #ff6b6b; }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg.user      { background: var(--surface); align-self: flex-end; border: 1px solid var(--border); }
    .msg.assistant { border-left: 2px solid var(--accent); padding-left: 12px; align-self: flex-start; }
    .msg.error     { border-left: 2px solid #ff6b6b; color: #ff6b6b; align-self: flex-start; }

    #input-area {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #model-select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
    }
    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 10px 12px;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      min-height: 40px;
      max-height: 120px;
    }
    #user-input:focus { outline: none; border-color: var(--accent); }
    #send-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      width: 40px; height: 40px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      flex-shrink: 0;
    }
    #send-btn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>

<div id="header">
  <span><span id="status-dot"></span>Openclaw Terminal</span>
  <select id="model-select">
    <option value="llama3">llama3</option>
    <option value="mistral">mistral</option>
    <option value="phi3">phi3</option>
    <option value="gemma2">gemma2</option>
  </select>
</div>

<div id="chat-box"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="Enter command..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">&#9658;</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.enableClosingConfirmation();

  // ── CONFIGURE: set to your Manager Node LAN IP ──────────────────────────
  // Must match LAN_IP in your .env (nginx binds HTTPS on this IP:8443)
  const GATEWAY = "https://MANAGER_LAN_IP:8443";
  // ────────────────────────────────────────────────────────────────────────

  const chatBox   = document.getElementById('chat-box');
  const input     = document.getElementById('user-input');
  const sendBtn   = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const messages  = [];   // conversation history for multi-turn context

  // Guard: initData is only injected by Telegram — absent in plain browser
  if (!tg.initData) {
    document.body.innerHTML = '<div style="color:#ff6b6b;padding:32px;font-family:monospace;">Must be opened inside Telegram.</div>';
    setTimeout(() => tg.close(), 2000);
  } else {
    statusDot.classList.add('ok');
  }

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    statusDot.className = 'ok';

    appendMsg('user', text);
    messages.push({ role: 'user', content: text });

    const model    = document.getElementById('model-select').value;
    const replyDiv = appendMsg('assistant', '▋');

    try {
      const res = await fetch(`${GATEWAY}/api/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          // Telegram HMAC-signed initData — verified server-side by auth-validator
          'X-Telegram-Init-Data': tg.initData
        },
        body: JSON.stringify({ model, messages, stream: true })
      });

      if (res.status === 401 || res.status === 403) {
        throw new Error(`Auth rejected (${res.status}) — check ALLOWED_USER_IDS`);
      }
      if (!res.ok) {
        throw new Error(`Gateway error: ${res.status}`);
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let fullText  = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          if (!line.trim()) continue;
          try {
            const json  = JSON.parse(line);
            const delta = json.message?.content ?? '';
            fullText   += delta;
            replyDiv.textContent = fullText + '▋';
            chatBox.scrollTop    = chatBox.scrollHeight;
          } catch { /* partial JSON line — skip */ }
        }
      }

      replyDiv.textContent = fullText;
      messages.push({ role: 'assistant', content: fullText });

    } catch (err) {
      replyDiv.className   = 'msg error';
      replyDiv.textContent = `Error: ${err.message}`;
      statusDot.className  = 'err';
      messages.pop();   // drop the failed user turn
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
