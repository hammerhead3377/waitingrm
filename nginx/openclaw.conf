# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Secure response headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options    nosniff           always;
    add_header X-Frame-Options           SAMEORIGIN        always;
    add_header X-Robots-Tag              "noindex, nofollow" always;

    limit_conn perip 20;

    # ── Mini App static files ─────────────────────────────────────────────
    location / {
        limit_req zone=static burst=10 nodelay;
        root      /var/www/openclaw;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Internal auth sub-request ─────────────────────────────────────────
    # Receives X-Telegram-Init-Data header, calls auth-validator, returns 200/401/403
    location = /_auth/validate {
        internal;
        proxy_pass              http://auth-validator:5000/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Telegram-Init-Data $http_x_telegram_init_data;
        proxy_set_header        X-Real-IP            $remote_addr;
    }

    # ── Ollama API (auth-gated) ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        auth_request     /_auth/validate;
        auth_request_set $auth_user_id $upstream_http_x_user_id;

        # Scrub incoming auth material before forwarding to Ollama
        proxy_set_header X-Telegram-Init-Data "";
        proxy_set_header Authorization       "";
        proxy_set_header X-User-Id           $auth_user_id;
        proxy_set_header Host                ollama;

        proxy_pass             http://ollama:11434/api/;
        proxy_http_version     1.1;
        proxy_read_timeout     300s;   # LLM inference can be slow
        proxy_send_timeout     60s;
        proxy_buffering        off;    # pass streaming chunks immediately
        chunked_transfer_encoding on;
    }

    # ── Open WebUI (auth-gated, optional) ────────────────────────────────
    location /webui/ {
        auth_request /_auth/validate;

        proxy_pass         http://open-webui:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Block dotfiles and anything unlisted
    location ~ /\. { deny all; }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
